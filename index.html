<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PokéAventura · Habitación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            background: #0a1f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
        }
        #game-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            border: 2px solid #ffb347;
            border-radius: 12px;
            image-rendering: crisp-edges;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            background: black;
        }
        /* Botón pantalla completa */
        #fullscreen-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: 0.2s;
        }
        #fullscreen-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        /* Controles táctiles */
        .touch-controls {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            inset: 0;
        }
        .dpad {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: grid;
            grid-template-columns: 50px 50px 50px;
            grid-template-rows: 50px 50px 50px;
            gap: 4px;
            pointer-events: auto;
        }
        .dpad button {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            font-size: 24px;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 6px black;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.05s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .dpad button:active {
            background: rgba(255,255,255,0.4);
            transform: scale(0.9);
        }
        .dpad .empty {
            background: transparent;
            border: none;
            pointer-events: none;
        }
        .action-btns {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            pointer-events: auto;
        }
        .action-btns button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 200, 120, 0.2);
            backdrop-filter: blur(6px);
            border: 2px solid rgba(255,255,255,0.4);
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 6px black;
            cursor: pointer;
            transition: 0.05s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btns button:active {
            background: rgba(255,200,120,0.5);
            transform: scale(0.9);
        }
        .action-btns button.glow {
            border-color: #ffb347;
            box-shadow: 0 0 12px #ffb347;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            from { box-shadow: 0 0 8px #ffb347; }
            to { box-shadow: 0 0 16px #ffb347; }
        }
        /* Nube de pensamiento (cómic) */
        .thought-cloud {
            position: absolute;
            background: white;
            border: 2px solid #333;
            border-radius: 50%;
            padding: 12px 20px;
            font-family: 'Comic Sans MS', 'Segoe UI', cursive;
            font-size: 14px;
            color: #222;
            text-align: center;
            white-space: pre-line;
            z-index: 50;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            max-width: 70%;
            left: 50%;
            top: 15%;
            transform: translateX(-50%);
        }
        .thought-cloud::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border: 10px solid transparent;
            border-top-color: white;
            border-bottom: 0;
        }
        /* Modales */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #fff3cf;
            max-width: 80%;
            padding: 20px;
            border-radius: 24px;
            border: 4px solid #ffcd7e;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #2c2b1f;
            white-space: pre-line;
        }
        .modal-content button {
            margin: 10px 5px;
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <button id="fullscreen-btn" title="Pantalla completa">⛶</button>
    <div class="touch-controls">
        <div class="dpad" id="dpad">
            <button class="empty"></button>
            <button id="btnUp">▲</button>
            <button class="empty"></button>
            <button id="btnLeft">◀</button>
            <button class="empty"></button>
            <button id="btnRight">▶</button>
            <button class="empty"></button>
            <button id="btnDown">▼</button>
            <button class="empty"></button>
        </div>
        <div class="action-btns" id="actionBtns">
            <button id="btnB">B</button>
            <button id="btnA">A</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const btnA = document.getElementById('btnA');

        // ==================== CONFIGURACIÓN ====================
        const CELL_SIZE = 20;
        const MAP_WIDTH = 1100;
        const MAP_HEIGHT = 504;
        const COLS = MAP_WIDTH / CELL_SIZE;
        const ROWS = MAP_HEIGHT / CELL_SIZE;
        const MOVE_DURATION = 200;
        const ANIM_FRAME_DURATION = 120;
        const CAMERA_MARGIN = 4 * CELL_SIZE;
        const CAMERA_SMOOTH = 0.25;

        const JAVI_DRAW_WIDTH = 88;
        const JAVI_DRAW_HEIGHT = 140;

        // ==================== IMÁGENES ====================
        const fondo = new Image();
        fondo.src = 'https://i.postimg.cc/BnqYsmvg/Habitacion-diminuta.png';

        const SPRITE_URLS = {
            javiFrente: 'https://i.postimg.cc/s2ZVkrzx/JAVIF.png',
            javiFrenteCaminando: 'https://i.postimg.cc/cJ8spSW6/JAVIFC-(2).png',
            javiDerecha: 'https://i.postimg.cc/tgVXKjbg/JAVID.png',
            javiDerechaCaminando: 'https://i.postimg.cc/fb0wGNsL/JAVIDC-Photoroom.png',
            javiIzquierda: 'https://i.postimg.cc/rpt8BkTD/JAVII.png',
            javiIzquierdaCaminando: 'https://i.postimg.cc/GmmPJMCV/JAVIIC1.png',
            javiAtras: 'https://i.postimg.cc/255k2Zc0/JAVIA.png',
            javiAtrasCaminando: 'https://i.postimg.cc/g2TQbLc2/JAVIAC.png'
        };
        const loadedImages = {};
        Object.entries(SPRITE_URLS).forEach(([key, url]) => {
            const img = new Image();
            img.src = url;
            loadedImages[key] = img;
        });

        // ==================== POLÍGONO DEL PISO (el que vos definiste) ====================
        const floorRaw = [11,6, 12,6, 12,11, 14,11, 14,13, 17,13, 17,11, 19,11, 19,6, 22,6, 24,6, 24,13, 36,13, 36,12, 37,11, 41,11, 41,15, 45,15, 45,12, 47,12, 48,14, 47,15, 47,20, 48,24, 45,23, 45,20, 40,20, 39,19, 30,19, 28,24, 7,24, 10,24, 11,6];
        const floorPolygon = [];
        for (let i = 0; i < floorRaw.length; i += 2) {
            floorPolygon.push({
                x: floorRaw[i] * CELL_SIZE + CELL_SIZE/2,
                y: floorRaw[i+1] * CELL_SIZE + CELL_SIZE/2
            });
        }

        // Obstáculos adicionales (objetos que no deben pisarse, pero sus bordes deben ser accesibles)
        const blockedRects = [
            { col1: 38, row1: 5, col2: 49, row2: 9 },   // escritorio
            { col1: 0, row1: 1, col2: 9, row2: 24 }     // placard
        ];

        // Objetos interactivos
        const interactiveObjects = [
            {
                id: 'escritorio',
                rect: { col1: 38, row1: 5, col2: 49, row2: 9 },
                interaction: { type: 'modal', text: '"No se puede disfrutar de un buen juego sin los recursos necesarios"' },
                once: true
            },
            {
                id: 'placard',
                rect: { col1: 0, row1: 1, col2: 9, row2: 24 },
                interaction: { type: 'thought', text: '¿Dónde estarán todos mis hoodies...?' }
            },
            {
                id: 'alfombra',
                rect: { col1: 10, row1: 22, col2: 15, row2: 24 },
                interaction: { type: 'exit', text: '¿Deseas salir de la habitación?' }
            }
        ];

        // ==================== ESTADO ====================
        let gameState = {
            javi: {
                col: 33, row: 14,
                faceDir: 'frente',
                moving: false,
                stepFrame: 0,
                moveStartX: 0, moveStartY: 0,
                moveEndX: 0, moveEndY: 0,
                moveStartTime: 0
            },
            flags: { setupGamer: false },
            camera: { x: 0, y: 0 },
            activeDir: { dx: 0, dy: 0 },
            viewWidth: MAP_WIDTH,
            viewHeight: MAP_HEIGHT,
            gameReady: false
        };

        // ==================== UTILIDADES ====================
        function pointInPolygon(px, py, poly) {
            let inside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                const xi = poly[i].x, yi = poly[i].y;
                const xj = poly[j].x, yj = poly[j].y;
                const intersect = ((yi > py) !== (yj > py)) &&
                    (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function isWalkable(col, row) {
            if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
            const px = col * CELL_SIZE + CELL_SIZE/2;
            const py = row * CELL_SIZE + CELL_SIZE/2;
            // Primero, verificar el polígono del piso
            if (!pointInPolygon(px, py, floorPolygon)) return false;
            // Luego, verificar que no esté bloqueado por un rectángulo
            for (let r of blockedRects) {
                if (col >= r.col1 && col <= r.col2 && row >= r.row1 && row <= r.row2) return false;
            }
            return true;
        }

        function getCellCenter(col, row) {
            return { x: col * CELL_SIZE + CELL_SIZE/2, y: row * CELL_SIZE + CELL_SIZE };
        }

        // ==================== MOVIMIENTO ====================
        function startMove(ch, targetCol, targetRow) {
            const start = getCellCenter(ch.col, ch.row);
            const end = getCellCenter(targetCol, targetRow);
            ch.moving = true;
            ch.moveStartX = start.x; ch.moveStartY = start.y;
            ch.moveEndX = end.x; ch.moveEndY = end.y;
            ch.moveStartTime = performance.now();
            ch.col = targetCol;
            ch.row = targetRow;
            ch.stepFrame = 0;
        }

        function tryMoveJavi() {
            const j = gameState.javi;
            if (j.moving || !gameState.gameReady) return;
            const dx = gameState.activeDir.dx, dy = gameState.activeDir.dy;
            if (dx === 0 && dy === 0) return;
            const nc = j.col + dx, nr = j.row + dy;
            if (!isWalkable(nc, nr)) return;

            if (dx > 0) j.faceDir = 'derecha';
            else if (dx < 0) j.faceDir = 'izquierda';
            else if (dy > 0) j.faceDir = 'frente';
            else if (dy < 0) j.faceDir = 'atras';

            startMove(j, nc, nr);
        }

        function updateCamera() {
            const j = gameState.javi;
            const jx = j.col * CELL_SIZE + CELL_SIZE/2;
            const jy = j.row * CELL_SIZE + CELL_SIZE/2;
            const viewW = gameState.viewWidth;
            const viewH = gameState.viewHeight;

            let targetX = jx - viewW/2;
            let targetY = jy - viewH/2;

            const margin = CAMERA_MARGIN;
            if (jx - gameState.camera.x < margin) targetX = jx - margin;
            else if (jx - gameState.camera.x > viewW - margin) targetX = jx - (viewW - margin);
            if (jy - gameState.camera.y < margin) targetY = jy - margin;
            else if (jy - gameState.camera.y > viewH - margin) targetY = jy - (viewH - margin);

            targetX = Math.max(0, Math.min(targetX, MAP_WIDTH - viewW));
            targetY = Math.max(0, Math.min(targetY, MAP_HEIGHT - viewH));

            gameState.camera.x += (targetX - gameState.camera.x) * CAMERA_SMOOTH;
            gameState.camera.y += (targetY - gameState.camera.y) * CAMERA_SMOOTH;
        }

        // ==================== INTERACCIONES ====================
        function getNearbyInteractive() {
            const j = gameState.javi;
            for (let obj of interactiveObjects) {
                const {col1, row1, col2, row2} = obj.rect;
                if (j.col >= col1 - 1 && j.col <= col2 + 1 && j.row >= row1 - 1 && j.row <= row2 + 1) {
                    return obj;
                }
            }
            return null;
        }

        function interactWithObject(obj) {
            if (!obj) return;
            const inter = obj.interaction;
            if (inter.type === 'modal') {
                showModal(inter.text, () => {
                    if (obj.id === 'escritorio' && !gameState.flags.setupGamer) {
                        gameState.flags.setupGamer = true;
                        saveGame();
                    }
                });
            } else if (inter.type === 'thought') {
                showThoughtCloud(inter.text);
            } else if (inter.type === 'exit') {
                if (!gameState.flags.setupGamer) {
                    showModal('Todavía hay que explorar este espacio un poco más');
                } else {
                    showModal(inter.text, () => {
                        // Transición a planta baja (placeholder)
                        alert('Próximamente: Planta baja');
                    }, true);
                }
            }
        }

        function showModal(text, onAccept, withOptions = false) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            let btns = withOptions
                ? '<button id="modalYes">Sí</button><button id="modalNo">No</button>'
                : '<button id="modalClose">Cerrar</button>';
            modal.innerHTML = `<div class="modal-content"><p>${text.replace(/\n/g,'<br>')}</p>${btns}</div>`;
            document.body.appendChild(modal);

            const close = () => { modal.remove(); if (onAccept) onAccept(); };
            if (withOptions) {
                document.getElementById('modalYes').onclick = () => close();
                document.getElementById('modalNo').onclick = () => modal.remove();
            } else {
                document.getElementById('modalClose').onclick = close;
            }
        }

        function showThoughtCloud(text) {
            const cloud = document.createElement('div');
            cloud.className = 'thought-cloud';
            cloud.textContent = text;
            document.getElementById('game-container').appendChild(cloud);
            setTimeout(() => cloud.remove(), 3000);
        }

        // ==================== DIBUJO ====================
        function drawScene() {
            ctx.clearRect(0, 0, gameState.viewWidth, gameState.viewHeight);
            const {camera} = gameState;
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            if (fondo.complete && fondo.naturalWidth > 0) {
                ctx.drawImage(fondo, 0, 0, MAP_WIDTH, MAP_HEIGHT);
            } else {
                ctx.fillStyle = '#2d6a4f';
                ctx.fillRect(0, 0, MAP_WIDTH, MAP_HEIGHT);
            }

            drawCharacter(gameState.javi, false);
            ctx.restore();

            // Brillo del botón A si hay objeto cercano
            if (getNearbyInteractive()) {
                btnA.classList.add('glow');
            } else {
                btnA.classList.remove('glow');
            }
        }

        function drawCharacter(ch, isSol = false) {
            const dirMap = { frente:'Frente', atras:'Atras', izquierda:'Izquierda', derecha:'Derecha' };
            let key = 'javi' + dirMap[ch.faceDir];
            if (ch.moving) key += (ch.stepFrame % 2 === 0) ? '' : 'Caminando';
            const img = loadedImages[key];

            let worldX, worldY;
            if (ch.moving) {
                const now = performance.now();
                const t = Math.min((now - ch.moveStartTime) / MOVE_DURATION, 1);
                worldX = ch.moveStartX + (ch.moveEndX - ch.moveStartX) * t;
                worldY = ch.moveStartY + (ch.moveEndY - ch.moveStartY) * t;
            } else {
                const center = getCellCenter(ch.col, ch.row);
                worldX = center.x;
                worldY = center.y;
            }

            const boxW = JAVI_DRAW_WIDTH;
            const boxH = JAVI_DRAW_HEIGHT;

            if (img && img.complete && img.naturalWidth > 0) {
                const s = Math.min(boxW / img.naturalWidth, boxH / img.naturalHeight);
                const dw = img.naturalWidth * s, dh = img.naturalHeight * s;
                const ox = (boxW - dw) / 2, oy = boxH - dh;
                ctx.drawImage(img, worldX - boxW/2 + ox, worldY - boxH + oy, dw, dh);
            } else {
                ctx.fillStyle = '#2b6';
                ctx.fillRect(worldX - boxW/2, worldY - boxH, boxW, boxH);
            }
        }

        // ==================== BUCLE ====================
        let lastAnimFrame = 0;
        function loop(now) {
            if (!gameState.gameReady) {
                requestAnimationFrame(loop);
                return;
            }
            if (now - lastAnimFrame >= ANIM_FRAME_DURATION) {
                lastAnimFrame = now;
                if (gameState.javi.moving) gameState.javi.stepFrame++;
            }
            const j = gameState.javi;
            if (j.moving) {
                if (now - j.moveStartTime >= MOVE_DURATION) {
                    j.moving = false;
                    j.stepFrame = 0;
                    if (gameState.activeDir.dx || gameState.activeDir.dy) tryMoveJavi();
                }
            } else if (gameState.activeDir.dx || gameState.activeDir.dy) {
                tryMoveJavi();
            }

            updateCamera();
            drawScene();
            requestAnimationFrame(loop);
        }

        // ==================== AJUSTE DE VENTANA (mantenemos el tamaño natural de la imagen) ====================
        fondo.onload = () => {
            canvas.width = fondo.naturalWidth;   // 550
            canvas.height = fondo.naturalHeight; // 252
            gameState.viewWidth = canvas.width;
            gameState.viewHeight = canvas.height;
            gameState.javi.col = Math.floor(COLS / 2);
            gameState.javi.row = Math.floor(ROWS / 2) + 1;
            updateCamera();
            gameState.gameReady = true;
        };

        // ==================== CONTROLES TÁCTILES ====================
        function setupTouchControls() {
            const btnUp = document.getElementById('btnUp');
            const btnDown = document.getElementById('btnDown');
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnB = document.getElementById('btnB');

            function addDirBtn(btn, dx, dy) {
                btn.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    gameState.activeDir.dx = dx;
                    gameState.activeDir.dy = dy;
                });
                btn.addEventListener('pointerup', (e) => {
                    e.preventDefault();
                    if (gameState.activeDir.dx === dx && gameState.activeDir.dy === dy) {
                        gameState.activeDir.dx = 0;
                        gameState.activeDir.dy = 0;
                    }
                });
                btn.addEventListener('pointerleave', (e) => {
                    if (gameState.activeDir.dx === dx && gameState.activeDir.dy === dy) {
                        gameState.activeDir.dx = 0;
                        gameState.activeDir.dy = 0;
                    }
                });
            }
            addDirBtn(btnUp, 0, -1);
            addDirBtn(btnDown, 0, 1);
            addDirBtn(btnLeft, -1, 0);
            addDirBtn(btnRight, 1, 0);

            btnA.addEventListener('click', () => {
                const obj = getNearbyInteractive();
                if (obj) interactWithObject(obj);
            });

            btnB.addEventListener('click', () => {
                const modals = document.querySelectorAll('.modal');
                if (modals.length) modals[modals.length-1].remove();
            });
        }

        // ==================== PANTALLA COMPLETA ====================
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // ==================== TECLADO (para desarrollo) ====================
        window.addEventListener('keydown', e => {
            if (e.key.startsWith('Arrow')) {
                e.preventDefault();
                switch (e.key) {
                    case 'ArrowLeft': gameState.activeDir.dx = -1; gameState.activeDir.dy = 0; break;
                    case 'ArrowRight': gameState.activeDir.dx = 1; gameState.activeDir.dy = 0; break;
                    case 'ArrowUp': gameState.activeDir.dx = 0; gameState.activeDir.dy = -1; break;
                    case 'ArrowDown': gameState.activeDir.dx = 0; gameState.activeDir.dy = 1; break;
                }
            }
        });
        window.addEventListener('keyup', e => {
            if (e.key.startsWith('Arrow')) {
                e.preventDefault();
                if ((e.key === 'ArrowLeft' && gameState.activeDir.dx === -1) ||
                    (e.key === 'ArrowRight' && gameState.activeDir.dx === 1) ||
                    (e.key === 'ArrowUp' && gameState.activeDir.dy === -1) ||
                    (e.key === 'ArrowDown' && gameState.activeDir.dy === 1)) {
                    gameState.activeDir.dx = 0;
                    gameState.activeDir.dy = 0;
                }
            }
        });

        // ==================== GUARDADO (localStorage) ====================
        function saveGame() {
            localStorage.setItem('pokeAmorSave', JSON.stringify({
                javi: { col: gameState.javi.col, row: gameState.javi.row, faceDir: gameState.javi.faceDir },
                flags: gameState.flags
            }));
        }
        function loadGame() {
            const raw = localStorage.getItem('pokeAmorSave');
            if (raw) {
                const data = JSON.parse(raw);
                gameState.javi.col = data.javi.col;
                gameState.javi.row = data.javi.row;
                gameState.javi.faceDir = data.javi.faceDir || 'frente';
                gameState.flags = data.flags || { setupGamer: false };
            }
        }

        // ==================== INICIO ====================
        function init() {
            loadGame();
            setupTouchControls();
            // El canvas se dimensiona al cargar la imagen; mientras tanto no está listo
            if (fondo.complete) {
                canvas.width = fondo.naturalWidth;
                canvas.height = fondo.naturalHeight;
                gameState.viewWidth = canvas.width;
                gameState.viewHeight = canvas.height;
                gameState.gameReady = true;
            }
            requestAnimationFrame(loop);
        }

        window.addEventListener('load', init);
    })();
</script>
</body>
</html>
