<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PokéAventura · Día 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        #game-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            border: 12px solid #111;
            border-radius: 24px;
            box-shadow: inset 0 0 0 2px #333;
        }
        canvas {
            display: block;
            background: black;
            image-rendering: pixelated;
            border-radius: 4px;
            flex-shrink: 0;
        }
        /* Transición a negro (escaleras) */
        #transition-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }
        #transition-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        #transition-text {
            color: #fff;
            font-size: 28px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #ffb347;
            animation: pulseText 1s infinite alternate;
        }
        @keyframes pulseText {
            from { opacity: 0.4; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1.02); }
        }
        /* Controles táctiles */
        .touch-controls {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            inset: 0;
        }
        .dpad {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: grid;
            grid-template-columns: 56px 56px 56px;
            grid-template-rows: 56px 56px 56px;
            gap: 6px;
            pointer-events: auto;
        }
        .dpad button {
            background: rgba(80, 80, 80, 0.7);
            backdrop-filter: blur(6px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.9);
            font-size: 26px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.4);
            transition: 0.05s;
            touch-action: manipulation;
        }
        .dpad button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 rgba(0,0,0,0.4);
        }
        .dpad .empty {
            background: transparent;
            border: none;
            box-shadow: none;
            pointer-events: none;
        }
        .action-btns {
            position: absolute;
            bottom: 40px;
            right: 30px;
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }
        .action-btns button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.3);
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 6px black;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.5);
            transition: 0.05s;
            touch-action: manipulation;
        }
        #btnA {
            background: linear-gradient(135deg, #ff8c00, #e67e22); /* Naranja favorito */
            border-color: #ffb347;
        }
        #btnB {
            background: linear-gradient(135deg, #4a90e2, #357abd);
            border-color: #5aa0ff;
        }
        .action-btns button:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 rgba(0,0,0,0.5);
        }
        #btnA.glow {
            animation: glowPulse 1s infinite alternate;
        }
        @keyframes glowPulse {
            from { box-shadow: 0 0 8px #ffb347, 0 6px 0 rgba(0,0,0,0.5); }
            to { box-shadow: 0 0 25px #ffb347, 0 6px 0 rgba(0,0,0,0.5); }
        }
        /* Modal y Burbuja */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #fff3cf;
            max-width: 85%;
            padding: 25px 30px;
            border-radius: 24px;
            border: 4px solid #ffcd7e;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #2c2b1f;
            white-space: pre-line;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .modal-content p { margin-bottom: 15px; }
        .modal-content button {
            margin: 0 8px;
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            background: #ffb347;
            color: #111;
            box-shadow: 0 4px 0 #cc8a2e;
            transition: 0.1s;
        }
        .modal-content button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #cc8a2e;
        }
        .modal-content button.no {
            background: #aaa;
            box-shadow: 0 4px 0 #777;
        }
        .thought-cloud {
            position: absolute;
            background: white;
            border: 3px solid #333;
            border-radius: 30px;
            padding: 15px 25px;
            font-family: 'Comic Sans MS', cursive;
            font-size: 16px;
            color: #222;
            text-align: center;
            z-index: 50;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            max-width: 80%;
            left: 50%;
            top: 15%;
            transform: translateX(-50%);
        }
        .thought-cloud::after {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            border: 10px solid transparent;
            border-top-color: white;
        }
        /* Responsive */
        @media (max-width: 600px) {
            .dpad button { width: 48px; height: 48px; font-size: 20px; }
            .action-btns button { width: 60px; height: 60px; font-size: 24px; }
            .dpad { gap: 4px; bottom: 20px; left: 15px; grid-template-columns: 48px 48px 48px; grid-template-rows: 48px 48px 48px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="touch-controls">
        <div class="dpad" id="dpad">
            <button class="empty"></button>
            <button id="btnUp">▲</button>
            <button class="empty"></button>
            <button id="btnLeft">◀</button>
            <button class="empty"></button>
            <button id="btnRight">▶</button>
            <button class="empty"></button>
            <button id="btnDown">▼</button>
            <button class="empty"></button>
        </div>
        <div class="action-btns" id="actionBtns">
            <button id="btnB">B</button>
            <button id="btnA">A</button>
        </div>
    </div>
</div>

<!-- Overlay para bajada de escaleras -->
<div id="transition-overlay">
    <div id="transition-text">Bajando las escaleras...</div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <p id="modal-text"></p>
        <div id="modal-buttons"></div>
    </div>
</div>

<script>
    (function() {
        // ==================== CONFIGURACIÓN ====================
        const CELL_SIZE = 20;
        const MAP_WIDTH = 1100;
        const MAP_HEIGHT = 504;
        const COLS = MAP_WIDTH / CELL_SIZE;
        const ROWS = MAP_HEIGHT / CELL_SIZE;
        const MOVE_DURATION = 180;
        const ANIM_FRAME_DURATION = 90;
        const CAMERA_MARGIN = 3 * CELL_SIZE;
        const CAMERA_SMOOTH = 0.2;

        const JAVI_DRAW_WIDTH = 88;
        const JAVI_DRAW_HEIGHT = 140;

        // ==================== IMÁGENES (Tus URLs) ====================
        const fondo = new Image();
        fondo.src = 'https://i.postimg.cc/BnqYsmvg/Habitacion-diminuta.png';

        const SPRITE_URLS = {
            javiFrente: 'https://i.postimg.cc/s2ZVkrzx/JAVIF.png',
            javiFrenteCaminando: 'https://i.postimg.cc/cJ8spSW6/JAVIFC-(2).png',
            javiDerecha: 'https://i.postimg.cc/tgVXKjbg/JAVID.png',
            javiDerechaCaminando: 'https://i.postimg.cc/fb0wGNsL/JAVIDC-Photoroom.png',
            javiIzquierda: 'https://i.postimg.cc/rpt8BkTD/JAVII.png',
            javiIzquierdaCaminando: 'https://i.postimg.cc/GmmPJMCV/JAVIIC1.png',
            javiAtras: 'https://i.postimg.cc/255k2Zc0/JAVIA.png',
            javiAtrasCaminando: 'https://i.postimg.cc/g2TQbLc2/JAVIAC.png'
        };
        const loadedImages = {};
        Object.entries(SPRITE_URLS).forEach(([key, url]) => {
            const img = new Image();
            img.src = url;
            loadedImages[key] = img;
        });

        // ==================== POLÍGONO DEL PISO ====================
        const floorString = "11,6, 12,6, 12,11, 14,11, 14,13, 17,13, 17,11, 19,11, 19,6, 22,6, 24,6, 24,13, 36,13, 36,12, 37,11, 41,11, 41,15, 45,15, 45,12, 47,12, 48,14, 47,15, 47,20, 48,24, 45,23, 45,20, 40,20, 39,19, 30,19, 28,24, 7,24, 10,24, 11,6";
        const nums = floorString.split(',').map(Number);
        const floorPolygon = [];
        for (let i = 0; i < nums.length; i += 2) {
            floorPolygon.push({
                x: nums[i] * CELL_SIZE + CELL_SIZE/2,
                y: nums[i+1] * CELL_SIZE + CELL_SIZE/2
            });
        }

        // ==================== OBJETOS SÓLIDOS ====================
        const blockedRects = [
            { col1: 38, row1: 5, col2: 49, row2: 9 },   // escritorio
            { col1: 0, row1: 1, col2: 9, row2: 24 }     // placard
        ];

        // ==================== OBJETOS INTERACTIVOS ====================
        const interactiveObjects = [
            {
                id: 'escritorio',
                rect: { col1: 38, row1: 5, col2: 49, row2: 9 },
                interaction: { type: 'modal', text: '"No se puede disfrutar de un buen juego sin los recursos necesarios"' },
                once: true
            },
            {
                id: 'placard',
                rect: { col1: 0, row1: 1, col2: 9, row2: 24 },
                interaction: { type: 'thought', text: '¿Dónde estarán todos mis hoodies...?' }
            },
            {
                id: 'puerta',
                rect: { col1: 10, row1: 22, col2: 15, row2: 24 },
                interaction: { type: 'exit' }
            }
        ];

        // ==================== ESTADO DEL JUEGO ====================
        let gameState = {
            javi: {
                col: 30, row: 11, // Al lado de la cama
                faceDir: 'frente',
                moving: false,
                stepFrame: 0,
                moveStartX: 0, moveStartY: 0,
                moveEndX: 0, moveEndY: 0,
                moveStartTime: 0
            },
            flags: { setupGamer: false },
            camera: { x: 0, y: 0 },
            activeDir: { dx: 0, dy: 0 },
            viewWidth: MAP_WIDTH,
            viewHeight: MAP_HEIGHT,
            gameReady: false
        };

        // ==================== UTILIDADES ====================
        function pointInPolygon(px, py, poly) {
            let inside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                const xi = poly[i].x, yi = poly[i].y;
                const xj = poly[j].x, yj = poly[j].y;
                const intersect = ((yi > py) !== (yj > py)) &&
                    (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function isWalkable(col, row) {
            if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
            const px = col * CELL_SIZE + CELL_SIZE/2;
            const py = row * CELL_SIZE + CELL_SIZE/2;
            if (!pointInPolygon(px, py, floorPolygon)) return false;
            for (let r of blockedRects) {
                if (col >= r.col1 && col <= r.col2 && row >= r.row1 && row <= r.row2) return false;
            }
            return true;
        }

        function findNearestWalkable(col, row) {
            if (isWalkable(col, row)) return {col, row};
            for (let radius = 1; radius < 15; radius++) {
                for (let dc = -radius; dc <= radius; dc++) {
                    for (let dr = -radius; dr <= radius; dr++) {
                        if (Math.abs(dc) + Math.abs(dr) === radius) {
                            const nc = col + dc, nr = row + dr;
                            if (isWalkable(nc, nr)) return {col: nc, row: nr};
                        }
                    }
                }
            }
            return {col: 12, row: 7}; // fallback
        }

        function getCellCenter(col, row) {
            return { x: col * CELL_SIZE + CELL_SIZE/2, y: row * CELL_SIZE + CELL_SIZE/2 };
        }

        // ==================== MOVIMIENTO ====================
        function startMove(ch, targetCol, targetRow) {
            const start = getCellCenter(ch.col, ch.row);
            const end = getCellCenter(targetCol, targetRow);
            ch.moving = true;
            ch.moveStartX = start.x; ch.moveStartY = start.y;
            ch.moveEndX = end.x; ch.moveEndY = end.y;
            ch.moveStartTime = performance.now();
            ch.col = targetCol;
            ch.row = targetRow;
            ch.stepFrame = 0;
        }

        function tryMoveJavi() {
            const j = gameState.javi;
            if (j.moving || !gameState.gameReady) return;
            const dx = gameState.activeDir.dx, dy = gameState.activeDir.dy;
            if (dx === 0 && dy === 0) return;
            const nc = j.col + dx, nr = j.row + dy;
            if (!isWalkable(nc, nr)) return;

            if (dx > 0) j.faceDir = 'derecha';
            else if (dx < 0) j.faceDir = 'izquierda';
            else if (dy > 0) j.faceDir = 'frente';
            else if (dy < 0) j.faceDir = 'atras';

            startMove(j, nc, nr);
        }

        function updateCamera() {
            const j = gameState.javi;
            const jx = j.col * CELL_SIZE + CELL_SIZE/2;
            const jy = j.row * CELL_SIZE + CELL_SIZE/2;
            const viewW = gameState.viewWidth;
            const viewH = gameState.viewHeight;

            let targetX = jx - viewW/2;
            let targetY = jy - viewH/2;

            const margin = CAMERA_MARGIN;
            if (jx - gameState.camera.x < margin) targetX = jx - margin;
            else if (jx - gameState.camera.x > viewW - margin) targetX = jx - (viewW - margin);
            if (jy - gameState.camera.y < margin) targetY = jy - margin;
            else if (jy - gameState.camera.y > viewH - margin) targetY = jy - (viewH - margin);

            targetX = Math.max(0, Math.min(targetX, MAP_WIDTH - viewW));
            targetY = Math.max(0, Math.min(targetY, MAP_HEIGHT - viewH));

            gameState.camera.x += (targetX - gameState.camera.x) * CAMERA_SMOOTH;
            gameState.camera.y += (targetY - gameState.camera.y) * CAMERA_SMOOTH;
        }

        // ==================== INTERACCIONES Y MODALES ====================
        function getNearbyInteractive() {
            const j = gameState.javi;
            for (let obj of interactiveObjects) {
                const midCol = (obj.rect.col1 + obj.rect.col2) / 2;
                const midRow = (obj.rect.row1 + obj.rect.row2) / 2;
                const dist = Math.abs(j.col - midCol) + Math.abs(j.row - midRow);
                if (dist <= 3) return obj;
            }
            return null;
        }

        function showModal(text, options, onYes, onNo) {
            const modal = document.getElementById('modal');
            const textP = document.getElementById('modal-text');
            const btnsDiv = document.getElementById('modal-buttons');

            textP.textContent = text;
            btnsDiv.innerHTML = '';

            if (options && options.length > 0) {
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.textContent = opt;
                    if (opt === 'No') btn.className = 'no';
                    btn.onclick = () => {
                        modal.style.display = 'none';
                        if (opt === 'Sí' && onYes) onYes();
                        if (opt === 'No' && onNo) onNo();
                    };
                    btnsDiv.appendChild(btn);
                });
            } else {
                const btn = document.createElement('button');
                btn.textContent = 'Cerrar';
                btn.onclick = () => { modal.style.display = 'none'; if (onYes) onYes(); };
                btnsDiv.appendChild(btn);
            }
            modal.style.display = 'flex';
        }

        function showThoughtCloud(text) {
            const container = document.getElementById('game-container');
            const cloud = document.createElement('div');
            cloud.className = 'thought-cloud';
            cloud.textContent = text;
            container.appendChild(cloud);
            setTimeout(() => cloud.remove(), 3000);
        }

        function showTransition(text, duration, callback) {
            const overlay = document.getElementById('transition-overlay');
            const textEl = document.getElementById('transition-text');
            textEl.textContent = text;
            overlay.classList.add('active');
            setTimeout(() => {
                overlay.classList.remove('active');
                if (callback) callback();
            }, duration);
        }

        function interactWithObject(obj) {
            if (!obj) return;
            const inter = obj.interaction;

            if (inter.type === 'modal') {
                showModal(inter.text, null, () => {
                    if (obj.id === 'escritorio' && !gameState.flags.setupGamer) {
                        gameState.flags.setupGamer = true;
                        saveGame();
                    }
                });
            } else if (inter.type === 'thought') {
                showThoughtCloud(inter.text);
            } else if (inter.type === 'exit') {
                showModal('¿Deseas salir de la habitación?', ['Sí', 'No'],
                    () => { // Sí
                        if (!gameState.flags.setupGamer) {
                            showModal('Todavía hay que explorar este espacio un poco más');
                        } else {
                            showTransition('Bajando las escaleras...', 2500, () => {
                                // Día 2: Planta baja (placeholder)
                                showModal('Has llegado a la planta baja. ¡Continúa mañana!');
                                // Reubicamos al personaje en el spawn de la habitación por ahora
                                const startPos = findNearestWalkable(30, 11);
                                gameState.javi.col = startPos.col;
                                gameState.javi.row = startPos.row;
                                gameState.javi.faceDir = 'frente';
                                saveGame();
                            });
                        }
                    },
                    () => { // No
                        // Solo se cierra
                    }
                );
            }
        }

        // ==================== DIBUJO ====================
        function drawScene() {
            ctx.clearRect(0, 0, gameState.viewWidth, gameState.viewHeight);
            const {camera} = gameState;
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            if (fondo.complete && fondo.naturalWidth > 0) {
                ctx.drawImage(fondo, 0, 0, MAP_WIDTH, MAP_HEIGHT);
            } else {
                ctx.fillStyle = '#2d6a4f';
                ctx.fillRect(0, 0, MAP_WIDTH, MAP_HEIGHT);
            }

            drawCharacter(gameState.javi, false);
            ctx.restore();

            // Brillo del botón A
            const btnA = document.getElementById('btnA');
            if (getNearbyInteractive() && !gameState.javi.moving) {
                btnA.classList.add('glow');
            } else {
                btnA.classList.remove('glow');
            }
        }

        function drawCharacter(ch, isSol = false) {
            const dirMap = { frente:'Frente', atras:'Atras', izquierda:'Izquierda', derecha:'Derecha' };
            let key = 'javi' + dirMap[ch.faceDir];
            if (ch.moving) key += (ch.stepFrame % 2 === 0) ? '' : 'Caminando';
            const img = loadedImages[key];

            let worldX, worldY;
            if (ch.moving) {
                const now = performance.now();
                const t = Math.min((now - ch.moveStartTime) / MOVE_DURATION, 1);
                worldX = ch.moveStartX + (ch.moveEndX - ch.moveStartX) * t;
                worldY = ch.moveStartY + (ch.moveEndY - ch.moveStartY) * t;
            } else {
                const center = getCellCenter(ch.col, ch.row);
                worldX = center.x;
                worldY = center.y;
            }

            const boxW = JAVI_DRAW_WIDTH;
            const boxH = JAVI_DRAW_HEIGHT;
            if (img && img.complete && img.naturalWidth > 0) {
                const s = Math.min(boxW / img.naturalWidth, boxH / img.naturalHeight);
                const dw = img.naturalWidth * s, dh = img.naturalHeight * s;
                const ox = (boxW - dw) / 2, oy = boxH - dh;
                ctx.drawImage(img, worldX - boxW/2 + ox, worldY - boxH + oy, dw, dh);
            } else {
                ctx.fillStyle = '#2b6';
                ctx.fillRect(worldX - boxW/2, worldY - boxH, boxW, boxH);
            }
        }

        // ==================== BUCLE PRINCIPAL ====================
        let lastAnimFrame = 0;
        function loop(now) {
            if (!gameState.gameReady) {
                requestAnimationFrame(loop);
                return;
            }
            if (now - lastAnimFrame >= ANIM_FRAME_DURATION) {
                lastAnimFrame = now;
                if (gameState.javi.moving) gameState.javi.stepFrame++;
            }
            const j = gameState.javi;
            if (j.moving) {
                if (now - j.moveStartTime >= MOVE_DURATION) {
                    j.moving = false;
                    j.stepFrame = 0;
                    if (gameState.activeDir.dx || gameState.activeDir.dy) tryMoveJavi();
                }
            } else if (gameState.activeDir.dx || gameState.activeDir.dy) {
                tryMoveJavi();
            }

            updateCamera();
            drawScene();
            requestAnimationFrame(loop);
        }

        // ==================== RESIZE (MARCO DE EMULADOR) ====================
        function resizeCanvas() {
            const container = document.getElementById('game-container');
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;

            const mapRatio = MAP_WIDTH / MAP_HEIGHT;
            let canvasWidth = containerHeight * mapRatio;
            let canvasHeight = containerHeight;

            if (canvasWidth > containerWidth) {
                canvasWidth = containerWidth;
                canvasHeight = canvasWidth / mapRatio;
            }

            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            gameState.viewWidth = canvasWidth;
            gameState.viewHeight = canvasHeight;
            updateCamera();
        }

        window.addEventListener('resize', resizeCanvas);

        // ==================== CONTROLES ====================
        function setupControls() {
            const btnUp = document.getElementById('btnUp');
            const btnDown = document.getElementById('btnDown');
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnA = document.getElementById('btnA');
            const btnB = document.getElementById('btnB');

            function addDirBtn(btn, dx, dy) {
                btn.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    gameState.activeDir.dx = dx;
                    gameState.activeDir.dy = dy;
                });
                btn.addEventListener('pointerup', (e) => {
                    e.preventDefault();
                    if (gameState.activeDir.dx === dx && gameState.activeDir.dy === dy) {
                        gameState.activeDir.dx = 0;
                        gameState.activeDir.dy = 0;
                    }
                });
                btn.addEventListener('pointerleave', (e) => {
                    if (gameState.activeDir.dx === dx && gameState.activeDir.dy === dy) {
                        gameState.activeDir.dx = 0;
                        gameState.activeDir.dy = 0;
                    }
                });
            }
            addDirBtn(btnUp, 0, -1);
            addDirBtn(btnDown, 0, 1);
            addDirBtn(btnLeft, -1, 0);
            addDirBtn(btnRight, 1, 0);

            btnA.addEventListener('click', () => {
                const obj = getNearbyInteractive();
                if (obj) interactWithObject(obj);
            });

            btnB.addEventListener('click', () => {
                document.getElementById('modal').style.display = 'none';
            });
        }

        // ==================== TECLADO (PC) ====================
        window.addEventListener('keydown', e => {
            if (e.key.startsWith('Arrow')) {
                e.preventDefault();
                switch (e.key) {
                    case 'ArrowLeft': gameState.activeDir.dx = -1; gameState.activeDir.dy = 0; break;
                    case 'ArrowRight': gameState.activeDir.dx = 1; gameState.activeDir.dy = 0; break;
                    case 'ArrowUp': gameState.activeDir.dx = 0; gameState.activeDir.dy = -1; break;
                    case 'ArrowDown': gameState.activeDir.dx = 0; gameState.activeDir.dy = 1; break;
                }
            }
            if (e.key === 'a' || e.key === 'A') {
                const obj = getNearbyInteractive();
                if (obj) interactWithObject(obj);
            }
            if (e.key === 'b' || e.key === 'B') {
                document.getElementById('modal').style.display = 'none';
            }
        });
        window.addEventListener('keyup', e => {
            if (e.key.startsWith('Arrow')) {
                e.preventDefault();
                if ((e.key === 'ArrowLeft' && gameState.activeDir.dx === -1) ||
                    (e.key === 'ArrowRight' && gameState.activeDir.dx === 1) ||
                    (e.key === 'ArrowUp' && gameState.activeDir.dy === -1) ||
                    (e.key === 'ArrowDown' && gameState.activeDir.dy === 1)) {
                    gameState.activeDir.dx = 0;
                    gameState.activeDir.dy = 0;
                }
            }
        });

        // ==================== GUARDADO ====================
        function saveGame() {
            localStorage.setItem('pokeAmorSave', JSON.stringify({
                javi: { col: gameState.javi.col, row: gameState.javi.row, faceDir: gameState.javi.faceDir },
                flags: gameState.flags
            }));
        }
        function loadGame() {
            const raw = localStorage.getItem('pokeAmorSave');
            if (raw) {
                const data = JSON.parse(raw);
                gameState.javi.col = data.javi.col;
                gameState.javi.row = data.javi.row;
                gameState.javi.faceDir = data.javi.faceDir || 'frente';
                gameState.flags = data.flags || { setupGamer: false };
                if (!isWalkable(gameState.javi.col, gameState.javi.row)) {
                    const nearest = findNearestWalkable(gameState.javi.col, gameState.javi.row);
                    gameState.javi.col = nearest.col;
                    gameState.javi.row = nearest.row;
                }
            }
        }

        // ==================== INICIO ====================
        function init() {
            loadGame();
            setupControls();
            const startPos = findNearestWalkable(gameState.javi.col, gameState.javi.row);
            gameState.javi.col = startPos.col;
            gameState.javi.row = startPos.row;
            resizeCanvas();
            gameState.gameReady = true;
            requestAnimationFrame(loop);
        }

        // Cargar fondo y luego iniciar
        fondo.onload = init;
        // Si la imagen ya está en caché, igual se ejecuta init
        if (fondo.complete && fondo.naturalWidth > 0) init();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
    })();
</script>
</body>
</html>
