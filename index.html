<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PokéAventura · Habitación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
        }
        #game-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            border: 2px solid #ffb347;
            border-radius: 12px;
            image-rendering: crisp-edges;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
        }
        /* Botón pantalla completa */
        #fullscreen-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: 0.2s;
            touch-action: manipulation;
        }
        #fullscreen-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        /* Controles táctiles */
        .touch-controls {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            inset: 0;
        }
        .dpad {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: grid;
            grid-template-columns: 50px 50px 50px;
            grid-template-rows: 50px 50px 50px;
            gap: 4px;
            pointer-events: auto;
        }
        .dpad button {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            font-size: 24px;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 6px black;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.05s;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .dpad button:active {
            background: rgba(255,255,255,0.4);
            transform: scale(0.9);
        }
        .dpad .empty {
            background: transparent;
            border: none;
            pointer-events: none;
        }
        .action-btns {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: row;   /* ahora horizontal */
            gap: 16px;
            pointer-events: auto;
        }
        .action-btns button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 200, 120, 0.2);
            backdrop-filter: blur(6px);
            border: 2px solid rgba(255,255,255,0.4);
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 6px black;
            cursor: pointer;
            transition: 0.05s;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btns button:active {
            background: rgba(255,200,120,0.5);
            transform: scale(0.9);
        }
        /* Indicador de celda (debug) */
        #cell-indicator {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            z-index: 30;
            display: none;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <button id="fullscreen-btn" title="Pantalla completa">⛶</button>
    <div id="cell-indicator"></div>
    <div class="touch-controls">
        <div class="dpad" id="dpad">
            <button class="empty"></button>
            <button id="btnUp">▲</button>
            <button class="empty"></button>
            <button id="btnLeft">◀</button>
            <button class="empty"></button>
            <button id="btnRight">▶</button>
            <button class="empty"></button>
            <button id="btnDown">▼</button>
            <button class="empty"></button>
        </div>
        <div class="action-btns" id="actionBtns">
            <button id="btnB">B</button>
            <button id="btnA">A</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const cellIndicator = document.getElementById('cell-indicator');

        // ==================== CONFIGURACIÓN ====================
        const DEBUG = true;   // modo debug (para mapear celdas)

        // Dimensiones lógicas del canvas (ventana visible)
        const VIEW_WIDTH = 550;
        const VIEW_HEIGHT = 252;

        // Dimensiones del mapa (más grande que la vista)
        const MAP_WIDTH = 1100;   // el doble de ancho
        const MAP_HEIGHT = 504;   // el doble de alto

        const CELL_SIZE = 20;          // celdas pequeñas
        const MOVE_DURATION = 250;    // ms por paso
        const ANIM_FRAME_DURATION = 150;

        const JAVI_DRAW_WIDTH = 44;
        const JAVI_DRAW_HEIGHT = 70;
        const SOL_DRAW_WIDTH = 40;
        const SOL_DRAW_HEIGHT = 63;
        const VERTICAL_OFFSET_SOL = 0;

        // ==================== IMÁGENES ====================
        const fondo = new Image();
        fondo.src = 'https://i.postimg.cc/BnqYsmvg/Habitacion-diminuta.png';

        const SPRITE_URLS = {
            javiFrente: 'https://i.postimg.cc/s2ZVkrzx/JAVIF.png',
            javiFrenteCaminando: 'https://i.postimg.cc/cJ8spSW6/JAVIFC-(2).png',
            javiDerecha: 'https://i.postimg.cc/tgVXKjbg/JAVID.png',
            javiDerechaCaminando: 'https://i.postimg.cc/fb0wGNsL/JAVIDC-Photoroom.png',
            javiIzquierda: 'https://i.postimg.cc/rpt8BkTD/JAVII.png',
            javiIzquierdaCaminando: 'https://i.postimg.cc/GmmPJMCV/JAVIIC1.png',
            javiAtras: 'https://i.postimg.cc/255k2Zc0/JAVIA.png',
            javiAtrasCaminando: 'https://i.postimg.cc/g2TQbLc2/JAVIAC.png',
            solFrente: 'https://i.postimg.cc/MT9qRKb5/Sol-F.png',
            solFrenteCaminando: 'https://i.postimg.cc/DZxnsydj/SOLFC.png',
            solDerecha: 'https://i.postimg.cc/Qtfh5xkk/Sol-D.png',
            solDerechaCaminando: 'https://i.postimg.cc/4dWstNb1/Sol-DC.png',
            solIzquierda: 'https://i.postimg.cc/Hx6d5s4h/Sol-I.png',
            solIzquierdaCaminando: 'https://i.postimg.cc/ZRw43KFD/Sol-IC.png',
            solAtras: 'https://i.postimg.cc/j5MtNdQ6/Sol-A.png',
            solAtrasCaminando: 'https://i.postimg.cc/bJmpbNHT/Sol-AC.png'
        };
        const loadedImages = {};
        Object.entries(SPRITE_URLS).forEach(([key, url]) => {
            const img = new Image();
            img.src = url;
            loadedImages[key] = img;
        });

        // ==================== ESTADO ====================
        let COLS = Math.floor(MAP_WIDTH / CELL_SIZE);   // 55
        let ROWS = Math.floor(MAP_HEIGHT / CELL_SIZE);  // 25

        let camera = { x: 0, y: 0 };
        let gameReady = false;

        // Colisiones (vacías de momento)
        let collisionRects = [];

        // Javi y Sol
        let javi = {
            col: 27, row: 12,   // centro aproximado del mapa
            faceDir: 'frente',
            moving: false,
            stepFrame: 0,
            moveStartX: 0, moveStartY: 0,
            moveEndX: 0, moveEndY: 0,
            moveStartTime: 0
        };
        let sol = {
            col: 26, row: 12,
            faceDir: 'frente',
            moving: false,
            stepFrame: 0,
            moveStartX: 0, moveStartY: 0,
            moveEndX: 0, moveEndY: 0,
            moveStartTime: 0,
            sideVertical: -1
        };

        let activeDir = { dx: 0, dy: 0 };

        // ==================== FUNCIONES ====================
        function getCellCenter(col, row) {
            return {
                x: col * CELL_SIZE + CELL_SIZE / 2,
                y: row * CELL_SIZE + CELL_SIZE
            };
        }

        function isCellBlocked(col, row) {
            const cx = col * CELL_SIZE + CELL_SIZE/2;
            const cy = row * CELL_SIZE + CELL_SIZE/2;
            for (let r of collisionRects) {
                if (cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) return true;
            }
            return false;
        }

        function canMoveTo(col, row) {
            return col >= 0 && col < COLS && row >= 0 && row < ROWS && !isCellBlocked(col, row);
        }

        function startMove(ch, targetCol, targetRow) {
            const start = getCellCenter(ch.col, ch.row);
            const end = getCellCenter(targetCol, targetRow);
            ch.moving = true;
            ch.moveStartX = start.x; ch.moveStartY = start.y;
            ch.moveEndX = end.x; ch.moveEndY = end.y;
            ch.moveStartTime = performance.now();
            ch.col = targetCol;
            ch.row = targetRow;
            ch.stepFrame = 0;
        }

        function tryMoveJavi() {
            if (javi.moving || !gameReady) return;
            const dx = activeDir.dx, dy = activeDir.dy;
            if (dx === 0 && dy === 0) return;
            const nc = javi.col + dx, nr = javi.row + dy;
            if (!canMoveTo(nc, nr)) return;

            if (dx > 0) javi.faceDir = 'derecha';
            else if (dx < 0) javi.faceDir = 'izquierda';
            else if (dy > 0) javi.faceDir = 'frente';
            else if (dy < 0) javi.faceDir = 'atras';

            startMove(javi, nc, nr);
            updateSolTarget();
            updateCamera();
        }

        function updateSolTarget() {
            let tc, tr;
            switch (javi.faceDir) {
                case 'derecha': tc = javi.col - 1; tr = javi.row; sol.sideVertical = -1; break;
                case 'izquierda': tc = javi.col + 1; tr = javi.row; sol.sideVertical = 1; break;
                default: tc = javi.col + sol.sideVertical; tr = javi.row;
            }
            tc = Math.max(0, Math.min(COLS-1, tc));
            tr = Math.max(0, Math.min(ROWS-1, tr));

            if (isCellBlocked(tc, tr)) {
                sol.faceDir = (sol.col === javi.col && sol.row === javi.row) ? 'frente' : javi.faceDir;
                return;
            }

            sol.faceDir = (tc === javi.col && tr === javi.row) ? 'frente' : javi.faceDir;
            if (!sol.moving && (sol.col !== tc || sol.row !== tr)) {
                startMove(sol, tc, tr);
            } else if (!sol.moving) {
                sol.faceDir = (sol.col === javi.col && sol.row === javi.row) ? 'frente' : javi.faceDir;
            }
            sol.targetCol = tc; sol.targetRow = tr;
        }

        function updateCamera() {
            // Margen: 4 celdas = 80 píxeles desde el borde de la vista
            const margin = 4 * CELL_SIZE;   // 80 px

            // Posición central deseada (en píxeles del mundo)
            const javiCenterX = javi.col * CELL_SIZE + CELL_SIZE/2;
            const javiCenterY = javi.row * CELL_SIZE + CELL_SIZE/2;

            // La cámara intenta mantener a Javi dentro de un rectángulo interior
            let targetCamX = javiCenterX - VIEW_WIDTH/2;
            let targetCamY = javiCenterY - VIEW_HEIGHT/2;

            // Aplicar margen: si Javi está cerca del borde izquierdo de la vista, la cámara se mueve
            if (javiCenterX - camera.x < margin) {
                targetCamX = javiCenterX - margin;
            } else if (javiCenterX - camera.x > VIEW_WIDTH - margin) {
                targetCamX = javiCenterX - (VIEW_WIDTH - margin);
            }

            if (javiCenterY - camera.y < margin) {
                targetCamY = javiCenterY - margin;
            } else if (javiCenterY - camera.y > VIEW_HEIGHT - margin) {
                targetCamY = javiCenterY - (VIEW_HEIGHT - margin);
            }

            // Limitar a los bordes del mapa
            camera.x = Math.max(0, Math.min(targetCamX, MAP_WIDTH - VIEW_WIDTH));
            camera.y = Math.max(0, Math.min(targetCamY, MAP_HEIGHT - VIEW_HEIGHT));
        }

        function updateAnimation(ch, now) {
            if (!ch.moving) return;
            const elapsed = now - ch.moveStartTime;
            const t = Math.min(elapsed / MOVE_DURATION, 1);
            if (t >= 1) {
                ch.moving = false;
                ch.stepFrame = 0;
                if (ch === javi && (activeDir.dx !== 0 || activeDir.dy !== 0)) {
                    tryMoveJavi();
                } else if (ch === sol) {
                    updateSolTarget();
                }
            }
        }

        // ==================== DIBUJO ====================
        function drawBackground() {
            if (fondo.complete && fondo.naturalWidth > 0) {
                // Dibujar la imagen escalada al tamaño del mapa
                ctx.drawImage(fondo, -camera.x, -camera.y, MAP_WIDTH, MAP_HEIGHT);
            } else {
                ctx.fillStyle = '#2d6a4f';
                ctx.fillRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
            }
            // Si debug, mostrar colisiones (si las hay) y grilla
            if (DEBUG) {
                // Grilla tenue
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 0.5;
                for (let c = 0; c <= COLS; c++) {
                    const x = c * CELL_SIZE - camera.x;
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, VIEW_HEIGHT);
                    ctx.stroke();
                }
                for (let r = 0; r <= ROWS; r++) {
                    const y = r * CELL_SIZE - camera.y;
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(VIEW_WIDTH, y);
                    ctx.stroke();
                }
                // Colisiones
                ctx.fillStyle = 'rgba(255,0,0,0.2)';
                for (let r of collisionRects) {
                    ctx.fillRect(r.x - camera.x, r.y - camera.y, r.w, r.h);
                }
            }
        }

        function drawChar(ch, isSol) {
            const dirMap = { frente:'Frente', atras:'Atras', izquierda:'Izquierda', derecha:'Derecha' };
            let key = (isSol ? 'sol' : 'javi') + dirMap[ch.faceDir];
            if (ch.moving) key += (ch.stepFrame % 2 === 0) ? '' : 'Caminando';
            const img = loadedImages[key];

            let worldX, worldY;
            if (ch.moving) {
                const now = performance.now();
                const t = Math.min((now - ch.moveStartTime) / MOVE_DURATION, 1);
                worldX = ch.moveStartX + (ch.moveEndX - ch.moveStartX) * t;
                worldY = ch.moveStartY + (ch.moveEndY - ch.moveStartY) * t;
            } else {
                const center = getCellCenter(ch.col, ch.row);
                worldX = center.x;
                worldY = center.y + (isSol ? VERTICAL_OFFSET_SOL : 0);
            }
            const screenX = worldX - camera.x;
            const screenY = worldY - camera.y;

            const boxW = isSol ? SOL_DRAW_WIDTH : JAVI_DRAW_WIDTH;
            const boxH = isSol ? SOL_DRAW_HEIGHT : JAVI_DRAW_HEIGHT;

            if (img && img.complete && img.naturalWidth > 0) {
                const scale = Math.min(boxW / img.naturalWidth, boxH / img.naturalHeight);
                const drawW = img.naturalWidth * scale;
                const drawH = img.naturalHeight * scale;
                const offsetX = (boxW - drawW) / 2;
                const offsetY = boxH - drawH;
                ctx.drawImage(img, screenX - boxW/2 + offsetX, screenY - boxH + offsetY, drawW, drawH);
            } else {
                ctx.fillStyle = isSol ? '#f9a' : '#2b6';
                ctx.fillRect(screenX - boxW/2, screenY - boxH, boxW, boxH);
            }
        }

        // ==================== DEBUG: CLIC PARA CELDA ====================
        canvas.addEventListener('click', (e) => {
            if (!DEBUG || !gameReady) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = VIEW_WIDTH / rect.width;   // relación entre canvas lógico y CSS
            const scaleY = VIEW_HEIGHT / rect.height;
            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;

            // Coordenadas del mundo
            const worldX = clickX + camera.x;
            const worldY = clickY + camera.y;
            const col = Math.floor(worldX / CELL_SIZE);
            const row = Math.floor(worldY / CELL_SIZE);

            // Mostrar indicador
            cellIndicator.style.display = 'block';
            cellIndicator.style.left = (e.clientX - rect.left) + 'px';
            cellIndicator.style.top = (e.clientY - rect.top) + 'px';
            cellIndicator.textContent = `${col},${row}`;
            setTimeout(() => { cellIndicator.style.display = 'none'; }, 1500);

            console.log(`Celda: col=${col}, row=${row} (x=${worldX.toFixed(0)}, y=${worldY.toFixed(0)})`);
        });

        // ==================== BUCLE ====================
        let lastAnimFrame = 0;
        function loop(now) {
            if (now - lastAnimFrame >= ANIM_FRAME_DURATION) {
                lastAnimFrame = now;
                if (javi.moving) javi.stepFrame++;
                if (sol.moving) sol.stepFrame++;
            }
            updateAnimation(javi, now);
            updateAnimation(sol, now);

            if (!javi.moving && (activeDir.dx !== 0 || activeDir.dy !== 0)) {
                tryMoveJavi();
            }

            ctx.clearRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
            drawBackground();
            drawChar(javi, false);
            drawChar(sol, true);

            requestAnimationFrame(loop);
        }

        // ==================== INICIALIZACIÓN ====================
        canvas.width = VIEW_WIDTH;
        canvas.height = VIEW_HEIGHT;

        // Posicionar a Javi en el centro del mapa grande
        javi.col = Math.floor(COLS / 2);
        javi.row = Math.floor(ROWS / 2);
        sol.col = javi.col - 1;
        sol.row = javi.row;
        updateCamera();
        gameReady = true;

        // ==================== CONTROLES TÁCTILES ====================
        function setupTouchControls() {
            const btnUp = document.getElementById('btnUp');
            const btnDown = document.getElementById('btnDown');
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnA = document.getElementById('btnA');
            const btnB = document.getElementById('btnB');

            function addDirBtn(btn, dx, dy) {
                btn.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    activeDir.dx = dx;
                    activeDir.dy = dy;
                });
                btn.addEventListener('pointerup', (e) => {
                    e.preventDefault();
                    if (activeDir.dx === dx && activeDir.dy === dy) {
                        activeDir.dx = 0;
                        activeDir.dy = 0;
                    }
                });
                btn.addEventListener('pointerleave', (e) => {
                    if (activeDir.dx === dx && activeDir.dy === dy) {
                        activeDir.dx = 0;
                        activeDir.dy = 0;
                    }
                });
                // Prevenir menú contextual
                btn.addEventListener('contextmenu', (e) => e.preventDefault());
            }
            addDirBtn(btnUp, 0, -1);
            addDirBtn(btnDown, 0, 1);
            addDirBtn(btnLeft, -1, 0);
            addDirBtn(btnRight, 1, 0);

            // Botón A (interactuar – placeholder)
            btnA.addEventListener('click', (e) => {
                e.preventDefault();
                console.log('A presionado (interactuar)');
                // Aquí luego activaremos la interacción con el objeto cercano
            });
            btnA.addEventListener('contextmenu', (e) => e.preventDefault());

            // Botón B (correr/cancelar – placeholder)
            btnB.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                // correr
            });
            btnB.addEventListener('pointerup', (e) => {
                e.preventDefault();
                // dejar de correr
            });
            btnB.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        // ==================== PANTALLA COMPLETA ====================
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // ==================== TECLADO ====================
        window.addEventListener('keydown', e => {
            if (e.key.startsWith('Arrow')) {
                e.preventDefault();
                switch (e.key) {
                    case 'ArrowLeft': activeDir.dx = -1; activeDir.dy = 0; break;
                    case 'ArrowRight': activeDir.dx = 1; activeDir.dy = 0; break;
                    case 'ArrowUp': activeDir.dx = 0; activeDir.dy = -1; break;
                    case 'ArrowDown': activeDir.dx = 0; activeDir.dy = 1; break;
                }
            }
        });
        window.addEventListener('keyup', e => {
            if (e.key.startsWith('Arrow')) {
                e.preventDefault();
                if ((e.key === 'ArrowLeft' && activeDir.dx === -1) ||
                    (e.key === 'ArrowRight' && activeDir.dx === 1) ||
                    (e.key === 'ArrowUp' && activeDir.dy === -1) ||
                    (e.key === 'ArrowDown' && activeDir.dy === 1)) {
                    activeDir.dx = 0;
                    activeDir.dy = 0;
                }
            }
        });

        setupTouchControls();
        requestAnimationFrame(loop);
    })();
</script>
</body>
</html>
