<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PokéAventura · Día 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            background: #000;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            image-rendering: crisp-edges;
        }
        /* Botón pantalla completa */
        #fullscreen-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            touch-action: manipulation;
        }
        /* Controles táctiles */
        .touch-controls {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            inset: 0;
        }
        .dpad {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: grid;
            grid-template-columns: 50px 50px 50px;
            grid-template-rows: 50px 50px 50px;
            gap: 4px;
            pointer-events: auto;
        }
        .dpad button {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            font-size: 24px;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 6px black;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.05s;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .dpad button:active {
            background: rgba(255,255,255,0.4);
            transform: scale(0.9);
        }
        .dpad .empty {
            background: transparent;
            border: none;
            pointer-events: none;
        }
        .action-btns {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: row;
            gap: 16px;
            pointer-events: auto;
        }
        .action-btns button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 200, 120, 0.2);
            backdrop-filter: blur(6px);
            border: 2px solid rgba(255,255,255,0.4);
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 6px black;
            cursor: pointer;
            transition: 0.05s;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btns button:active {
            background: rgba(255,200,120,0.5);
            transform: scale(0.9);
        }
        /* Modales */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #fff3cf;
            max-width: 80%;
            padding: 20px;
            border-radius: 24px;
            border: 4px solid #ffcd7e;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #2c2b1f;
            white-space: pre-line;
        }
        .modal-content button {
            margin: 10px 5px;
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        /* Nube de pensamiento (cómic) */
        .thought-cloud {
            position: absolute;
            background: white;
            border: 2px solid #333;
            border-radius: 50%;
            padding: 12px 20px;
            font-family: 'Comic Sans MS', 'Segoe UI', cursive;
            font-size: 14px;
            color: #222;
            text-align: center;
            white-space: pre-line;
            z-index: 50;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            max-width: 70%;
            left: 50%;
            top: 15%;
            transform: translateX(-50%);
        }
        .thought-cloud::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border: 10px solid transparent;
            border-top-color: white;
            border-bottom: 0;
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <button id="fullscreen-btn" title="Pantalla completa">⛶</button>
    <div class="touch-controls">
        <div class="dpad" id="dpad">
            <button class="empty"></button>
            <button id="btnUp">▲</button>
            <button class="empty"></button>
            <button id="btnLeft">◀</button>
            <button class="empty"></button>
            <button id="btnRight">▶</button>
            <button class="empty"></button>
            <button id="btnDown">▼</button>
            <button class="empty"></button>
        </div>
        <div class="action-btns" id="actionBtns">
            <button id="btnB">B</button>
            <button id="btnA">A</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ==================== CONFIGURACIÓN ====================
        const CELL_SIZE = 20;
        const MAP_WIDTH = 1100;
        const MAP_HEIGHT = 504;
        const COLS = MAP_WIDTH / CELL_SIZE;
        const ROWS = MAP_HEIGHT / CELL_SIZE;
        const MOVE_DURATION = 200;
        const ANIM_FRAME_DURATION = 120;
        const CAMERA_MARGIN = 4 * CELL_SIZE;

        const JAVI_DRAW_WIDTH = 88;
        const JAVI_DRAW_HEIGHT = 140;

        // ==================== IMÁGENES ====================
        const fondoHabitacion = new Image();
        fondoHabitacion.src = 'https://i.postimg.cc/BnqYsmvg/Habitacion-diminuta.png';

        const SPRITE_URLS = {
            javiFrente: 'https://i.postimg.cc/s2ZVkrzx/JAVIF.png',
            javiFrenteCaminando: 'https://i.postimg.cc/cJ8spSW6/JAVIFC-(2).png',
            javiDerecha: 'https://i.postimg.cc/tgVXKjbg/JAVID.png',
            javiDerechaCaminando: 'https://i.postimg.cc/fb0wGNsL/JAVIDC-Photoroom.png',
            javiIzquierda: 'https://i.postimg.cc/rpt8BkTD/JAVII.png',
            javiIzquierdaCaminando: 'https://i.postimg.cc/GmmPJMCV/JAVIIC1.png',
            javiAtras: 'https://i.postimg.cc/255k2Zc0/JAVIA.png',
            javiAtrasCaminando: 'https://i.postimg.cc/g2TQbLc2/JAVIAC.png'
        };
        const loadedImages = {};
        Object.entries(SPRITE_URLS).forEach(([key, url]) => {
            const img = new Image();
            img.src = url;
            loadedImages[key] = img;
        });

        // ==================== POLÍGONO DEL PISO (corregido) ====================
        const floorRaw = [11,6, 12,6, 12,11, 14,11, 14,13, 17,13, 17,11, 19,11, 19,6, 22,6, 24,6, 24,13, 36,13, 36,12, 37,11, 41,11, 41,15, 45,15, 45,12, 47,12, 48,14, 47,15, 47,20, 48,24, 45,23, 45,20, 40,20, 39,19, 30,19, 28,24, 7,24, 10,24, 11,6];
        const floorPolygon = [];
        for (let i = 0; i < floorRaw.length; i += 2) {
            floorPolygon.push({
                x: floorRaw[i] * CELL_SIZE + CELL_SIZE/2,
                y: floorRaw[i+1] * CELL_SIZE + CELL_SIZE/2
            });
        }

        // Objetos interactivos
        const interactiveObjects = [
            {
                id: 'escritorio',
                type: 'rect', col1: 38, row1: 5, col2: 49, row2: 9,
                interaction: { type: 'modal', text: '"No se puede disfrutar de un buen juego sin los recursos necesarios"' },
                required: true,
                once: true
            },
            {
                id: 'placard',
                type: 'rect', col1: 0, row1: 1, col2: 9, row2: 24,
                interaction: { type: 'thought', text: '¿Dónde estarán todos mis hoodies...?' }
            },
            {
                id: 'alfombra',
                type: 'rect', col1: 10, row1: 22, col2: 15, row2: 24,
                interaction: { type: 'exit', target: 'plantaBaja', condition: () => gameState.flags.setupGamer }
            }
        ];

        // ==================== ESTADO ====================
        let gameState = {
            currentMap: 'dormitorio',
            javi: { col: 33, row: 14, faceDir: 'frente', moving: false, stepFrame: 0,
                    moveStartX:0, moveStartY:0, moveEndX:0, moveEndY:0, moveStartTime:0 },
            flags: { setupGamer: false },
            camera: { x:0, y:0 },
            activeDir: { dx:0, dy:0 },
            viewWidth: MAP_WIDTH,
            viewHeight: MAP_HEIGHT,
            gameReady: false
        };

        // ==================== UTILIDADES ====================
        function pointInPolygon(px, py, poly) {
            let inside = false;
            for (let i = 0, j = poly.length-1; i < poly.length; j = i++) {
                const xi = poly[i].x, yi = poly[i].y;
                const xj = poly[j].x, yj = poly[j].y;
                const intersect = ((yi > py) !== (yj > py)) &&
                    (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function isWalkable(col, row) {
            if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
            const px = col * CELL_SIZE + CELL_SIZE/2;
            const py = row * CELL_SIZE + CELL_SIZE/2;
            return pointInPolygon(px, py, floorPolygon);
        }

        function getCellCenter(col, row) {
            return { x: col * CELL_SIZE + CELL_SIZE/2, y: row * CELL_SIZE + CELL_SIZE };
        }

        function findNearestWalkable(col, row) {
            if (isWalkable(col, row)) return {col, row};
            for (let r = 1; r < 10; r++) {
                for (let dc = -r; dc <= r; dc++) {
                    for (let dr = -r; dr <= r; dr++) {
                        if (Math.abs(dc)+Math.abs(dr) === r) {
                            const nc = col+dc, nr = row+dr;
                            if (isWalkable(nc, nr)) return {col: nc, row: nr};
                        }
                    }
                }
            }
            return {col:12, row:7};
        }

        // ==================== MOVIMIENTO ====================
        function startMove(ch, targetCol, targetRow) {
            const start = getCellCenter(ch.col, ch.row);
            const end = getCellCenter(targetCol, targetRow);
            ch.moving = true;
            ch.moveStartX = start.x; ch.moveStartY = start.y;
            ch.moveEndX = end.x; ch.moveEndY = end.y;
            ch.moveStartTime = performance.now();
            ch.col = targetCol; ch.row = targetRow;
            ch.stepFrame = 0;
        }

        function tryMoveJavi() {
            const j = gameState.javi;
            if (j.moving || !gameState.gameReady) return;
            const dx = gameState.activeDir.dx, dy = gameState.activeDir.dy;
            if (dx === 0 && dy === 0) return;
            const nc = j.col + dx, nr = j.row + dy;
            if (!isWalkable(nc, nr)) return;

            if (dx > 0) j.faceDir = 'derecha';
            else if (dx < 0) j.faceDir = 'izquierda';
            else if (dy > 0) j.faceDir = 'frente';
            else if (dy < 0) j.faceDir = 'atras';

            startMove(j, nc, nr);
            updateCamera();
            checkExitZones();
        }

        function updateCamera() {
            const j = gameState.javi;
            const jx = j.col * CELL_SIZE + CELL_SIZE/2;
            const jy = j.row * CELL_SIZE + CELL_SIZE/2;
            let cam = gameState.camera;
            const viewW = gameState.viewWidth;
            const viewH = gameState.viewHeight;

            let targetX = jx - viewW/2;
            let targetY = jy - viewH/2;

            const margin = CAMERA_MARGIN;
            if (jx - cam.x < margin) targetX = jx - margin;
            else if (jx - cam.x > viewW - margin) targetX = jx - (viewW - margin);
            if (jy - cam.y < margin) targetY = jy - margin;
            else if (jy - cam.y > viewH - margin) targetY = jy - (viewH - margin);

            cam.x = Math.max(0, Math.min(targetX, MAP_WIDTH - viewW));
            cam.y = Math.max(0, Math.min(targetY, MAP_HEIGHT - viewH));
        }

        // ==================== INTERACCIONES ====================
        function getNearbyInteractive() {
            const j = gameState.javi;
            for (let obj of interactiveObjects) {
                const {col1, row1, col2, row2} = obj;
                if (j.col >= col1 - 1 && j.col <= col2 + 1 && j.row >= row1 - 1 && j.row <= row2 + 1) {
                    return obj;
                }
            }
            return null;
        }

        function isNearInteractive() {
            return getNearbyInteractive() !== null;
        }

        function interactWithObject(obj) {
            if (!obj) return;
            const inter = obj.interaction;
            if (inter.type === 'modal') {
                showModal(inter.text, () => {
                    if (obj.id === 'escritorio' && !gameState.flags.setupGamer) {
                        gameState.flags.setupGamer = true;
                        saveGame();
                    }
                });
            } else if (inter.type === 'thought') {
                showThoughtCloud(inter.text);
            } else if (inter.type === 'exit') {
                const alfombra = obj;
                if (!gameState.flags.setupGamer) {
                    showModal('Todavía hay que explorar este espacio un poco más');
                } else {
                    showModal('¿Deseas salir de la habitación?', () => {
                        transitionToMap('plantaBaja');
                    }, true);
                }
            }
        }

        function checkExitZones() {
            // La interacción con la alfombra se maneja con A, no automáticamente.
        }

        function showModal(text, onAccept, withOptions = false) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            let btns = withOptions
                ? '<button id="modalYes">Sí</button><button id="modalNo">No</button>'
                : '<button id="modalClose">Cerrar</button>';
            modal.innerHTML = `<div class="modal-content"><p>${text.replace(/\n/g,'<br>')}</p>${btns}</div>`;
            document.body.appendChild(modal);

            const close = () => { modal.remove(); if (onAccept) onAccept(); };
            if (withOptions) {
                document.getElementById('modalYes').onclick = () => close();
                document.getElementById('modalNo').onclick = () => modal.remove();
            } else {
                document.getElementById('modalClose').onclick = close;
            }
        }

        function showThoughtCloud(text) {
            const cloud = document.createElement('div');
            cloud.className = 'thought-cloud';
            cloud.textContent = text;
            document.getElementById('game-container').appendChild(cloud);
            setTimeout(() => cloud.remove(), 3000);
        }

        function transitionToMap(mapId) {
            // Pantalla negra de transición
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:white;display:flex;justify-content:center;align-items:center;font-size:24px;z-index:200;';
            overlay.textContent = 'Bajando las escaleras...';
            document.body.appendChild(overlay);
            setTimeout(() => {
                overlay.remove();
                // Cambiamos al mapa plantaBaja (fondo genérico)
                gameState.currentMap = mapId;
                gameState.javi.col = 2;   // entrada izquierda
                gameState.javi.row = 12;
                gameState.camera.x = 0;
                gameState.camera.y = 0;
                gameState.flags.setupGamer = false; // reset para pruebas (luego lo manejaremos con días)
                updateCamera();
                saveGame();
            }, 2000);
        }

        // ==================== DIBUJO ====================
        function drawScene() {
            ctx.clearRect(0, 0, gameState.viewWidth, gameState.viewHeight);
            const {camera} = gameState;
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Fondo según mapa actual
            if (gameState.currentMap === 'dormitorio') {
                if (fondoHabitacion.complete) {
                    ctx.drawImage(fondoHabitacion, 0, 0, MAP_WIDTH, MAP_HEIGHT);
                } else {
                    ctx.fillStyle = '#2d6a4f';
                    ctx.fillRect(0, 0, MAP_WIDTH, MAP_HEIGHT);
                }
            } else if (gameState.currentMap === 'plantaBaja') {
                // Fondo genérico de sala (gradiente)
                const grad = ctx.createLinearGradient(0, 0, 0, MAP_HEIGHT);
                grad.addColorStop(0, '#d4a373');
                grad.addColorStop(1, '#8b5a2b');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, MAP_WIDTH, MAP_HEIGHT);
                ctx.fillStyle = '#6b4f3c';
                ctx.fillRect(0, MAP_HEIGHT-40, MAP_WIDTH, 40); // piso
            }

            // Resplandor de objetos interactivos cercanos
            const nearObj = getNearbyInteractive();
            if (nearObj && nearObj.type === 'rect') {
                const {col1, row1, col2, row2} = nearObj;
                const x = col1 * CELL_SIZE;
                const y = row1 * CELL_SIZE;
                const w = (col2 - col1 + 1) * CELL_SIZE;
                const h = (row2 - row1 + 1) * CELL_SIZE;
                ctx.save();
                ctx.shadowColor = 'rgba(255, 200, 100, 0.8)';
                ctx.shadowBlur = 15;
                ctx.strokeStyle = 'rgba(255, 200, 100, 0.9)';
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, w, h);
                ctx.restore();
            }

            // Personaje
            drawCharacter(gameState.javi, false);

            ctx.restore();
        }

        function drawCharacter(ch, isSol = false) {
            const dirMap = { frente:'Frente', atras:'Atras', izquierda:'Izquierda', derecha:'Derecha' };
            let key = 'javi' + dirMap[ch.faceDir];
            if (ch.moving) key += (ch.stepFrame % 2 === 0) ? '' : 'Caminando';
            const img = loadedImages[key];

            let worldX, worldY;
            if (ch.moving) {
                const now = performance.now();
                const t = Math.min((now - ch.moveStartTime) / MOVE_DURATION, 1);
                worldX = ch.moveStartX + (ch.moveEndX - ch.moveStartX) * t;
                worldY = ch.moveStartY + (ch.moveEndY - ch.moveStartY) * t;
            } else {
                const center = getCellCenter(ch.col, ch.row);
                worldX = center.x;
                worldY = center.y;
            }

            const boxW = JAVI_DRAW_WIDTH;
            const boxH = JAVI_DRAW_HEIGHT;

            if (img && img.complete && img.naturalWidth > 0) {
                const s = Math.min(boxW / img.naturalWidth, boxH / img.naturalHeight);
                const dw = img.naturalWidth * s, dh = img.naturalHeight * s;
                const ox = (boxW - dw) / 2, oy = boxH - dh;
                ctx.drawImage(img, worldX - boxW/2 + ox, worldY - boxH + oy, dw, dh);
            } else {
                ctx.fillStyle = '#2b6';
                ctx.fillRect(worldX - boxW/2, worldY - boxH, boxW, boxH);
            }
        }

        // ==================== BUCLE ====================
        let lastAnimFrame = 0;
        function loop(now) {
            if (!gameState.gameReady) {
                requestAnimationFrame(loop);
                return;
            }
            if (now - lastAnimFrame >= ANIM_FRAME_DURATION) {
                lastAnimFrame = now;
                if (gameState.javi.moving) gameState.javi.stepFrame++;
            }
            const j = gameState.javi;
            if (j.moving) {
                if (now - j.moveStartTime >= MOVE_DURATION) {
                    j.moving = false;
                    j.stepFrame = 0;
                    if (gameState.activeDir.dx || gameState.activeDir.dy) tryMoveJavi();
                }
            } else if (gameState.activeDir.dx || gameState.activeDir.dy) {
                tryMoveJavi();
            }

            drawScene();
            requestAnimationFrame(loop);
        }

        // ==================== AJUSTE DE VENTANA ====================
        function resizeCanvas() {
            const container = document.getElementById('game-container');
            const w = container.clientWidth;
            const h = container.clientHeight;
            const mapRatio = MAP_WIDTH / MAP_HEIGHT;
            if (w / h > mapRatio) {
                canvas.width = h * mapRatio;
                canvas.height = h;
            } else {
                canvas.width = w;
                canvas.height = w / mapRatio;
            }
            gameState.viewWidth = canvas.width;
            gameState.viewHeight = canvas.height;
            updateCamera();
        }
        window.addEventListener('resize', resizeCanvas);

        // ==================== CONTROLES ====================
        function setupControls() {
            const btnUp = document.getElementById('btnUp');
            const btnDown = document.getElementById('btnDown');
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnA = document.getElementById('btnA');
            const btnB = document.getElementById('btnB');

            function addDir(btn, dx, dy) {
                btn.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    gameState.activeDir.dx = dx; gameState.activeDir.dy = dy;
                });
                btn.addEventListener('pointerup', (e) => {
                    e.preventDefault();
                    if (gameState.activeDir.dx === dx && gameState.activeDir.dy === dy)
                        gameState.activeDir.dx = gameState.activeDir.dy = 0;
                });
                btn.addEventListener('pointerleave', (e) => {
                    if (gameState.activeDir.dx === dx && gameState.activeDir.dy === dy)
                        gameState.activeDir.dx = gameState.activeDir.dy = 0;
                });
            }
            addDir(btnUp, 0, -1);
            addDir(btnDown, 0, 1);
            addDir(btnLeft, -1, 0);
            addDir(btnRight, 1, 0);

            btnA.addEventListener('click', () => {
                const obj = getNearbyInteractive();
                if (obj) interactWithObject(obj);
            });
            btnB.addEventListener('click', () => {
                const modals = document.querySelectorAll('.modal');
                if (modals.length) modals[modals.length-1].remove();
            });
        }

        // ==================== PANTALLA COMPLETA ====================
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (document.fullscreenElement) document.exitFullscreen();
            else document.documentElement.requestFullscreen();
        });

        // ==================== TECLADO (desarrollo) ====================
        window.addEventListener('keydown', e => {
            if (e.key.startsWith('Arrow')) {
                e.preventDefault();
                const dir = { ArrowLeft: [-1,0], ArrowRight: [1,0], ArrowUp: [0,-1], ArrowDown: [0,1] }[e.key];
                gameState.activeDir.dx = dir[0]; gameState.activeDir.dy = dir[1];
            }
        });
        window.addEventListener('keyup', e => {
            if (e.key.startsWith('Arrow')) {
                e.preventDefault();
                const dir = { ArrowLeft: [-1,0], ArrowRight: [1,0], ArrowUp: [0,-1], ArrowDown: [0,1] }[e.key];
                if (gameState.activeDir.dx === dir[0] && gameState.activeDir.dy === dir[1])
                    gameState.activeDir.dx = gameState.activeDir.dy = 0;
            }
        });

        // ==================== GUARDADO ====================
        function saveGame() {
            localStorage.setItem('pokeAmorSave', JSON.stringify({
                currentMap: gameState.currentMap,
                javi: { col: gameState.javi.col, row: gameState.javi.row, faceDir: gameState.javi.faceDir },
                flags: gameState.flags
            }));
        }
        function loadGame() {
            const raw = localStorage.getItem('pokeAmorSave');
            if (raw) {
                const data = JSON.parse(raw);
                gameState.currentMap = data.currentMap || 'dormitorio';
                gameState.javi.col = data.javi.col;
                gameState.javi.row = data.javi.row;
                gameState.javi.faceDir = data.javi.faceDir || 'frente';
                gameState.flags = data.flags || { setupGamer: false };
                if (!isWalkable(gameState.javi.col, gameState.javi.row)) {
                    const nearest = findNearestWalkable(gameState.javi.col, gameState.javi.row);
                    gameState.javi.col = nearest.col;
                    gameState.javi.row = nearest.row;
                }
            } else {
                const start = findNearestWalkable(33, 14);
                gameState.javi.col = start.col;
                gameState.javi.row = start.row;
            }
        }

        // ==================== INICIO ====================
        function init() {
            loadGame();
            setupControls();
            resizeCanvas();
            gameState.gameReady = true;
            updateCamera();
            requestAnimationFrame(loop);
        }
        window.addEventListener('load', init);
    })();
</script>
</body>
</html>
