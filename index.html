<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Prueba Habitación Diminuta (550x252)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a1f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        canvas {
            border: 2px solid #ffb347;
            border-radius: 16px;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            image-rendering: crisp-edges;
            display: block;
        }
        .info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div class="info">🎮 Flechas para mover a Javi | Habitación 550x252</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ==================== IMAGEN DE FONDO ====================
        const fondo = new Image();
        fondo.src = 'https://i.postimg.cc/BnqYsmvg/Habitacion-diminuta.png';

        // ==================== SPRITES ====================
        const SPRITE_URLS = {
            javiFrente: 'https://i.postimg.cc/s2ZVkrzx/JAVIF.png',
            javiFrenteCaminando: 'https://i.postimg.cc/cJ8spSW6/JAVIFC-(2).png',
            javiDerecha: 'https://i.postimg.cc/tgVXKjbg/JAVID.png',
            javiDerechaCaminando: 'https://i.postimg.cc/fb0wGNsL/JAVIDC-Photoroom.png',
            javiIzquierda: 'https://i.postimg.cc/rpt8BkTD/JAVII.png',
            javiIzquierdaCaminando: 'https://i.postimg.cc/GmmPJMCV/JAVIIC1.png',
            javiAtras: 'https://i.postimg.cc/255k2Zc0/JAVIA.png',
            javiAtrasCaminando: 'https://i.postimg.cc/g2TQbLc2/JAVIAC.png',
            solFrente: 'https://i.postimg.cc/MT9qRKb5/Sol-F.png',
            solFrenteCaminando: 'https://i.postimg.cc/DZxnsydj/SOLFC.png',
            solDerecha: 'https://i.postimg.cc/Qtfh5xkk/Sol-D.png',
            solDerechaCaminando: 'https://i.postimg.cc/4dWstNb1/Sol-DC.png',
            solIzquierda: 'https://i.postimg.cc/Hx6d5s4h/Sol-I.png',
            solIzquierdaCaminando: 'https://i.postimg.cc/ZRw43KFD/Sol-IC.png',
            solAtras: 'https://i.postimg.cc/j5MtNdQ6/Sol-A.png',
            solAtrasCaminando: 'https://i.postimg.cc/bJmpbNHT/Sol-AC.png'
        };
        const loadedImages = {};
        Object.entries(SPRITE_URLS).forEach(([key, url]) => {
            const img = new Image();
            img.src = url;
            loadedImages[key] = img;
        });

        // ==================== DIMENSIONES ====================
        const CELL_SIZE = 40;
        let COLS, ROWS;
        const MOVE_DURATION = 200;
        const ANIM_FRAME_DURATION = 120;
        const VERTICAL_OFFSET_SOL = 0;
        const JAVI_DRAW_WIDTH = 44;
        const JAVI_DRAW_HEIGHT = 70;
        const SOL_DRAW_WIDTH = 40;
        const SOL_DRAW_HEIGHT = 63;

        // Capa de colisión (por ahora vacía, luego la llenaremos con rectángulos)
        let collisionRects = [];

        // ==================== ESTADO ====================
        let javi = {
            col: 7, row: 4,
            faceDir: 'frente',
            moving: false,
            stepFrame: 0,
            moveStartX: 0, moveStartY: 0,
            moveEndX: 0, moveEndY: 0,
            moveStartTime: 0
        };
        let sol = {
            col: 6, row: 4,
            faceDir: 'frente',
            moving: false,
            stepFrame: 0,
            moveStartX: 0, moveStartY: 0,
            moveEndX: 0, moveEndY: 0,
            moveStartTime: 0,
            sideVertical: -1
        };

        let activeDir = { dx: 0, dy: 0 };
        let gameReady = false;

        // ==================== FUNCIONES ====================
        function getCellCenter(col, row) {
            return {
                x: col * CELL_SIZE + CELL_SIZE / 2,
                y: row * CELL_SIZE + CELL_SIZE
            };
        }
        function getCharPos(col, row, isSol) {
            const c = getCellCenter(col, row);
            return { x: c.x, y: c.y + (isSol ? VERTICAL_OFFSET_SOL : 0) };
        }

        function startMove(ch, targetCol, targetRow) {
            const start = getCharPos(ch.col, ch.row, ch === sol);
            const end = getCharPos(targetCol, targetRow, ch === sol);
            ch.moving = true;
            ch.moveStartX = start.x; ch.moveStartY = start.y;
            ch.moveEndX = end.x; ch.moveEndY = end.y;
            ch.moveStartTime = performance.now();
            ch.col = targetCol; ch.row = targetRow;
            ch.stepFrame = 0;
        }

        function isCellBlocked(col, row) {
            // Verificar si el centro de la celda cae dentro de algún rectángulo de colisión
            const cx = col * CELL_SIZE + CELL_SIZE / 2;
            const cy = row * CELL_SIZE + CELL_SIZE / 2;
            for (let r of collisionRects) {
                if (cx >= r.x && cx <= r.x + r.w &&
                    cy >= r.y && cy <= r.y + r.h) {
                    return true;
                }
            }
            return false;
        }

        function canMoveTo(col, row) {
            return col >= 0 && col < COLS && row >= 0 && row < ROWS && !isCellBlocked(col, row);
        }

        function tryMoveJavi() {
            if (javi.moving || !gameReady) return;
            const dx = activeDir.dx, dy = activeDir.dy;
            if (dx === 0 && dy === 0) return;
            const nc = javi.col + dx, nr = javi.row + dy;
            if (!canMoveTo(nc, nr)) return;

            if (dx > 0) javi.faceDir = 'derecha';
            else if (dx < 0) javi.faceDir = 'izquierda';
            else if (dy > 0) javi.faceDir = 'frente';
            else if (dy < 0) javi.faceDir = 'atras';

            startMove(javi, nc, nr);
            updateSolTarget();
        }

        function updateSolTarget() {
            let tc, tr;
            switch (javi.faceDir) {
                case 'derecha': tc = javi.col - 1; tr = javi.row; sol.sideVertical = -1; break;
                case 'izquierda': tc = javi.col + 1; tr = javi.row; sol.sideVertical = 1; break;
                default: tc = javi.col + sol.sideVertical; tr = javi.row;
            }
            tc = Math.max(0, Math.min(COLS-1, tc));
            tr = Math.max(0, Math.min(ROWS-1, tr));

            // No bloquear a Sol por colisiones (si queremos que ella pueda atravesar muebles o no)
            if (isCellBlocked(tc, tr)) {
                // Si la celda deseada está bloqueada, buscar una alternativa cercana
                // Por ahora, simplemente no moverse
                sol.faceDir = (sol.col === javi.col && sol.row === javi.row) ? 'frente' : javi.faceDir;
                return;
            }

            sol.faceDir = (tc === javi.col && tr === javi.row) ? 'frente' : javi.faceDir;

            if (!sol.moving && (sol.col !== tc || sol.row !== tr)) {
                startMove(sol, tc, tr);
            } else if (!sol.moving) {
                sol.faceDir = (sol.col === javi.col && sol.row === javi.row) ? 'frente' : javi.faceDir;
            }
            sol.targetCol = tc; sol.targetRow = tr;
        }

        function updateAnimation(ch, now) {
            if (!ch.moving) return;
            const elapsed = now - ch.moveStartTime;
            const t = Math.min(elapsed / MOVE_DURATION, 1);
            if (t >= 1) {
                ch.moving = false;
                ch.stepFrame = 0;
                if (ch === javi && (activeDir.dx !== 0 || activeDir.dy !== 0)) {
                    tryMoveJavi();
                } else if (ch === sol) {
                    updateSolTarget();
                }
            }
        }

        // ==================== DIBUJO ====================
        function drawBackground() {
            if (fondo.complete && fondo.naturalWidth > 0) {
                ctx.drawImage(fondo, 0, 0);
            } else {
                ctx.fillStyle = '#2d6a4f';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            // Cuadrícula tenue (opcional, para debug)
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 0.5;
            for (let c = 0; c <= COLS; c++) {
                ctx.beginPath();
                ctx.moveTo(c * CELL_SIZE, 0);
                ctx.lineTo(c * CELL_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let r = 0; r <= ROWS; r++) {
                ctx.beginPath();
                ctx.moveTo(0, r * CELL_SIZE);
                ctx.lineTo(canvas.width, r * CELL_SIZE);
                ctx.stroke();
            }
            // Dibujar rectángulos de colisión (opaco, solo para debug)
            ctx.fillStyle = 'rgba(255,0,0,0.2)';
            for (let r of collisionRects) {
                ctx.fillRect(r.x, r.y, r.w, r.h);
            }
        }

        function drawChar(ch, isSol) {
            const dirMap = { frente:'Frente', atras:'Atras', izquierda:'Izquierda', derecha:'Derecha' };
            let key = (isSol ? 'sol' : 'javi') + dirMap[ch.faceDir];
            if (ch.moving) {
                key += (ch.stepFrame % 2 === 0) ? '' : 'Caminando';
            }
            const img = loadedImages[key];

            let x, y;
            if (ch.moving) {
                const now = performance.now();
                const t = Math.min((now - ch.moveStartTime) / MOVE_DURATION, 1);
                x = ch.moveStartX + (ch.moveEndX - ch.moveStartX) * t;
                y = ch.moveStartY + (ch.moveEndY - ch.moveStartY) * t;
            } else {
                const pos = getCharPos(ch.col, ch.row, isSol);
                x = pos.x; y = pos.y;
            }

            const boxW = isSol ? SOL_DRAW_WIDTH : JAVI_DRAW_WIDTH;
            const boxH = isSol ? SOL_DRAW_HEIGHT : JAVI_DRAW_HEIGHT;

            if (img && img.complete && img.naturalWidth > 0) {
                const imgW = img.naturalWidth;
                const imgH = img.naturalHeight;
                const scale = Math.min(boxW / imgW, boxH / imgH);
                const drawW = imgW * scale;
                const drawH = imgH * scale;
                const offsetX = (boxW - drawW) / 2;
                const offsetY = boxH - drawH;
                ctx.drawImage(img, x - boxW/2 + offsetX, y - boxH + offsetY, drawW, drawH);
            } else {
                ctx.fillStyle = isSol ? '#f9a' : '#2b6';
                ctx.fillRect(x - boxW/2, y - boxH, boxW, boxH);
            }
        }

        // ==================== BUCLE ====================
        let lastAnimFrame = 0;
        function loop(now) {
            if (now - lastAnimFrame >= ANIM_FRAME_DURATION) {
                lastAnimFrame = now;
                if (javi.moving) javi.stepFrame++;
                if (sol.moving) sol.stepFrame++;
            }
            updateAnimation(javi, now);
            updateAnimation(sol, now);

            if (!javi.moving && (activeDir.dx !== 0 || activeDir.dy !== 0)) {
                tryMoveJavi();
            }

            drawBackground();
            drawChar(javi, false);
            drawChar(sol, true);

            requestAnimationFrame(loop);
        }

        // ==================== INICIALIZACIÓN ====================
        fondo.onload = () => {
            canvas.width = fondo.naturalWidth;
            canvas.height = fondo.naturalHeight;
            COLS = Math.floor(canvas.width / CELL_SIZE);
            ROWS = Math.floor(canvas.height / CELL_SIZE);
            javi.col = Math.floor(COLS / 2);
            javi.row = Math.floor(ROWS / 2) + 1;
            sol.col = javi.col - 1;
            sol.row = javi.row;
            gameReady = true;
        };

        // ==================== TECLADO ====================
        window.addEventListener('keydown', e => {
            if (e.key.startsWith('Arrow')) {
                e.preventDefault();
                switch (e.key) {
                    case 'ArrowLeft': activeDir.dx = -1; activeDir.dy = 0; break;
                    case 'ArrowRight': activeDir.dx = 1; activeDir.dy = 0; break;
                    case 'ArrowUp': activeDir.dx = 0; activeDir.dy = -1; break;
                    case 'ArrowDown': activeDir.dx = 0; activeDir.dy = 1; break;
                }
            }
        });
        window.addEventListener('keyup', e => {
            if (e.key.startsWith('Arrow')) {
                e.preventDefault();
                if ((e.key === 'ArrowLeft' && activeDir.dx === -1) ||
                    (e.key === 'ArrowRight' && activeDir.dx === 1) ||
                    (e.key === 'ArrowUp' && activeDir.dy === -1) ||
                    (e.key === 'ArrowDown' && activeDir.dy === 1)) {
                    activeDir.dx = 0;
                    activeDir.dy = 0;
                }
            }
        });

        requestAnimationFrame(loop);
    })();
</script>
</body>
</html>
